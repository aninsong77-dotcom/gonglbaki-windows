<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>곤글박이</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    background: radial-gradient(ellipse at 35% 35%, #ffffff 0%, #faf7f2 55%, #f0ebe3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    opacity: 1;
    transition: opacity 1.1s ease;
  }
  body.fade-out { opacity: 0; }

  body::before {
    content: '';
    position: fixed;
    top: -100px; left: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 65%);
    pointer-events: none;
  }

  /* 카드 크기는 원본 그대로 */
  .scene {
    perspective: 1600px;
    width: 360px;
    height: 220px;
    animation: float 6s ease-in-out infinite;
    position: relative;
  }

  @keyframes float {
    0%,100% { transform: translateY(0px) translateX(0px); }
    33%      { transform: translateY(-16px) translateX(5px); }
    66%      { transform: translateY(-9px) translateX(-7px); }
  }

  .card-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    /* 12초 → 10초로 단축 */
    animation: spin-once 10s ease-in-out forwards;
  }

  @keyframes spin-once {
    0%   { transform: rotateY(0deg)   rotateX(10deg)  rotateZ(-3deg); }
    25%  { transform: rotateY(180deg) rotateX(-6deg)  rotateZ(2deg); }
    50%  { transform: rotateY(360deg) rotateX(10deg)  rotateZ(-3deg); }
    75%  { transform: rotateY(360deg) rotateX(4deg)   rotateZ(-1deg); }
    100% { transform: rotateY(360deg) rotateX(10deg)  rotateZ(-3deg); }
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 18px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 25px 70px rgba(0,0,0,0.20),
      0 6px 18px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,1),
      inset 0 -1px 0 rgba(0,0,0,0.04);
    border: 0.5px solid rgba(210,210,210,0.8);
    overflow: hidden;
  }

  .face-back { transform: rotateY(180deg); }

  .face img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 20px;
  }

  .ground-shadow {
    position: absolute;
    bottom: -52px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 28px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.13) 0%, transparent 70%);
    border-radius: 50%;
    animation: gshadow 6s ease-in-out infinite;
  }

  @keyframes gshadow {
    0%,100% { transform: translateX(-50%) scaleX(0.88); opacity: 0.7; }
    33%      { transform: translateX(-50%) scaleX(1.06); opacity: 0.38; }
    66%      { transform: translateX(-50%) scaleX(0.96); opacity: 0.50; }
  }
</style>
</head>

<style>
  #download-overlay {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.92);
    border-radius: 16px;
    padding: 24px 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    min-width: 360px;
    text-align: center;
    z-index: 100;
  }
  #download-overlay.show { display: block; }
  #dl-title {
    font-size: 15px;
    font-weight: 700;
    color: #3a4a3a;
    margin-bottom: 6px;
  }
  #dl-subtitle {
    font-size: 12px;
    color: #7a8a7a;
    margin-bottom: 16px;
  }
  .dl-model-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .dl-model-label {
    font-size: 12px;
    color: #4a5a4a;
    width: 130px;
    text-align: left;
    flex-shrink: 0;
  }
  .dl-bar-wrap {
    flex: 1;
    background: #e8ece8;
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  .dl-bar {
    height: 100%;
    width: 0%;
    border-radius: 6px;
    background: linear-gradient(90deg, #3a6a4a, #5a9a6a);
    transition: width 0.4s ease;
  }
  .dl-bar.skip { background: #b0c8b0; width: 100%; }
  .dl-bar.done { background: #3a6a4a; width: 100%; }
  .dl-status {
    font-size: 11px;
    color: #7a8a7a;
    width: 50px;
    text-align: right;
    flex-shrink: 0;
  }
  #dl-overall {
    margin-top: 14px;
    font-size: 11px;
    color: #9aaa9a;
  }
</style>

<div id="download-overlay">
  <div id="dl-title">🔽 AI 음성 변환 모델 준비 중...</div>
  <div id="dl-subtitle">처음 한 번만 다운로드합니다. 잠시만 기다려주세요.</div>
  <div class="dl-model-row" id="row-small">
    <div class="dl-model-label">Small (약 250MB)</div>
    <div class="dl-bar-wrap"><div class="dl-bar" id="bar-small"></div></div>
    <div class="dl-status" id="status-small">대기</div>
  </div>
  <div class="dl-model-row" id="row-medium">
    <div class="dl-model-label">Medium (약 750MB)</div>
    <div class="dl-bar-wrap"><div class="dl-bar" id="bar-medium"></div></div>
    <div class="dl-status" id="status-medium">대기</div>
  </div>
  <div class="dl-model-row" id="row-large">
    <div class="dl-model-label">Large (약 6GB)</div>
    <div class="dl-bar-wrap"><div class="dl-bar" id="bar-large"></div></div>
    <div class="dl-status" id="status-large">대기</div>
  </div>
  <div id="dl-overall">전체 0 / 3 완료</div>
</div>

<script>
  // 메인창 준비 완료 신호 → 페이드아웃
  if (window.electronAPI && window.electronAPI.onStartFade) {
    window.electronAPI.onStartFade(() => {
      document.body.classList.add('fade-out');
    });
  }

  // 서버 준비 완료 신호 수신
  if (window.electronAPI && window.electronAPI.onStartDownload) {
    window.electronAPI.onStartDownload(async () => {

      // ① 어떤 엔진이든 모델이 하나라도 있는지 확인
      let anyModelCached = false;
      try {
        const [r1, r2] = await Promise.all([
          fetch('http://127.0.0.1:5577/api/models/status'),
          fetch('http://127.0.0.1:5577/api/models/cpp/status'),
        ]);
        const d1 = await r1.json();
        const d2 = await r2.json();
        anyModelCached =
          Object.values(d1).some(m => m.cached) ||
          Object.values(d2).some(m => m.cached);
      } catch(e) {
        anyModelCached = false;
      }

      // ② 모델이 하나라도 있으면 → 바로 메인창
      if (anyModelCached) {
        if (window.electronAPI && window.electronAPI.modelsReady) {
          window.electronAPI.modelsReady();
        }
        return;
      }

      // ③ 아무 모델도 없으면 → 다운로드 UI 표시 후 미디엄만 다운로드
      const overlay = document.getElementById('download-overlay');
      overlay.classList.add('show');

      // 스몰/라지 행은 숨김 (최초엔 미디엄만)
      document.getElementById('row-small').style.display = 'none';
      document.getElementById('row-large').style.display = 'none';
      document.getElementById('dl-overall').style.display = 'none';

      const bar = document.getElementById('bar-medium');
      const status = document.getElementById('status-medium');

      // 진행바 초기화
      bar.style.width = '5%';
      bar.style.transition = 'width 3s ease-out';
      status.textContent = '다운 중';

      let pingCount = 0;
      let finished = false;

      function goToMain() {
        if (finished) return;
        finished = true;
        clearInterval(timeoutTimer);
        if (window.electronAPI && window.electronAPI.modelsReady) {
          window.electronAPI.modelsReady();
        }
      }

      // 30분 타임아웃 — 네트워크 문제 등으로 무한정 멈출 경우 자동 진행
      const timeoutTimer = setInterval(() => {
        if (!finished) {
          clearInterval(timeoutTimer);
          es.close();
          status.textContent = '⏱️ 시간 초과';
          document.getElementById('dl-subtitle').textContent = '다운로드가 오래 걸리고 있어요. 앱을 시작합니다.';
          setTimeout(goToMain, 2000);
        }
      }, 10 * 60 * 1000);

      const es = new EventSource('http://127.0.0.1:5577/api/models/download/medium');

      es.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'ping') {
          // 이전 버전 호환용 (서버가 progress 미지원 시)
          pingCount++;
          const progress = Math.min(92, 5 + pingCount * 1.5);
          bar.style.transition = 'width 4s ease-out';
          bar.style.width = progress + '%';
          return;
        }
        if (data.type === 'progress') {
          // 실제 진행률 표시
          const p = data.progress || 0;
          bar.style.transition = 'width 2.5s ease-out';
          bar.style.width = Math.max(p, parseInt(bar.style.width) || 0) + '%';
          return;
        }
        if (data.type === 'start') {
          bar.style.transition = 'width 2s ease-out';
          bar.style.width = '5%';
          status.textContent = '다운 중';
        } else if (data.type === 'done') {
          clearInterval(timeoutTimer);
          bar.className = 'dl-bar done';
          bar.style.transition = 'width 0.5s ease-out';
          bar.style.width = '100%';
          status.textContent = '✓ 완료';
          es.close();
          document.getElementById('dl-title').textContent = '✅ 준비 완료!';
          document.getElementById('dl-subtitle').textContent = '곤글박이를 시작합니다...';
          setTimeout(goToMain, 800);
        } else if (data.type === 'error') {
          clearInterval(timeoutTimer);
          es.close();
          status.textContent = '❌ 오류';
          document.getElementById('dl-subtitle').textContent = '오류가 발생했습니다. 앱을 시작하고 설정에서 다시 다운로드해주세요.';
          setTimeout(goToMain, 3000);
        }
      };

      es.onerror = () => {
        if (finished) return;
        es.close();
        setTimeout(goToMain, 1500);
      };
    });
  }
</script>
